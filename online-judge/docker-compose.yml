services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: "${OJ_NODE_BASE_IMAGE:-node:24-bookworm-slim}"
        MAVEN_BASE_IMAGE: "${OJ_MAVEN_BASE_IMAGE:-maven:3.9.9-eclipse-temurin-17}"
        JRE_BASE_IMAGE: "${OJ_JRE_BASE_IMAGE:-eclipse-temurin:17-jre}"
        DOCKER_CLI_IMAGE: "${OJ_DOCKER_CLI_IMAGE:-docker:29-cli}"
    image: "${OJ_APP_IMAGE:-wenzhong-oj-app:latest}"
    container_name: wenzhong-oj-app
    environment:
      SERVER_PORT: "8081"
      APP_PROFILE: school
      EXECUTOR_MODE: docker
      POSTGRES_JDBC_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-onlinejudge}"
      POSTGRES_USER: "${POSTGRES_USER:-onlinejudge}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-postgres-password}"
      TEACHER_PASSWORD: "${TEACHER_PASSWORD:-}"
      TEACHER_SESSION_SECRET: "${TEACHER_SESSION_SECRET:-}"
      STUDENT_TOKEN_SECRET: "${STUDENT_TOKEN_SECRET:-}"
      OJ_CPP17_DOCKER_IMAGE: "${OJ_CPP17_DOCKER_IMAGE:-wenzhong-oj-cpp17-runner:13}"
      OJ_PYTHON3_DOCKER_IMAGE: "${OJ_PYTHON3_DOCKER_IMAGE:-python:3.12-slim}"
      AI_ENABLED: "${AI_ENABLED:-true}"
      OJ_MODELSCOPE_API_KEY: "${OJ_MODELSCOPE_API_KEY:-${MODELSCOPE_API_KEY:-}}"
      MODELSCOPE_API_KEY: "${OJ_MODELSCOPE_API_KEY:-${MODELSCOPE_API_KEY:-}}"
      AI_BASE_URL: "${OJ_AI_BASE_URL:-${AI_BASE_URL:-https://api-inference.modelscope.cn/v1}}"
      AI_MODEL: "${OJ_AI_MODEL:-${AI_MODEL:-deepseek-ai/DeepSeek-V4-Pro}}"
      AI_MODEL_POOL: "${OJ_AI_MODEL_POOL:-${AI_MODEL_POOL:-deepseek-ai/DeepSeek-V4-Pro,Qwen/Qwen3.5-35B-A3B,Qwen/Qwen3.5-27B,Qwen/Qwen3.5-122B-A10B}}"
      AI_MODELSCOPE_COMPATIBLE_REQUEST: "${AI_MODELSCOPE_COMPATIBLE_REQUEST:-auto}"
      AI_ENABLE_THINKING: "${AI_ENABLE_THINKING:-false}"
      AI_TIMEOUT_SECONDS: "${AI_TIMEOUT_SECONDS:-30}"
      AI_EXTERNAL_RUNTIME_PROFILE: "${AI_EXTERNAL_RUNTIME_PROFILE:-low-latency}"
      AI_STREAM_ENABLED: "${AI_STREAM_ENABLED:-true}"
      AI_STREAM_FALLBACK_ENABLED: "${AI_STREAM_FALLBACK_ENABLED:-false}"
      AI_STRUCTURED_RETRY_ENABLED: "${AI_STRUCTURED_RETRY_ENABLED:-false}"
      AI_RETRY_MAX_ATTEMPTS: "${AI_RETRY_MAX_ATTEMPTS:-1}"
      AI_STUDENT_FEEDBACK_MIN_REQUEST_INTERVAL_MS: "${AI_STUDENT_FEEDBACK_MIN_REQUEST_INTERVAL_MS:-2000}"
      AI_READINESS_BLOCKING: "${AI_READINESS_BLOCKING:-true}"
    ports:
      - "${SERVER_PORT:-8081}:8081"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      cpp17-runner:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: "${OJ_POSTGRES_IMAGE:-pgvector/pgvector:pg16}"
    container_name: wenzhong-oj-postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-onlinejudge}"
      POSTGRES_USER: "${POSTGRES_USER:-onlinejudge}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-postgres-password}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onlinejudge} -d ${POSTGRES_DB:-onlinejudge}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  cpp17-runner:
    build:
      context: ./docker/cpp17-runner
      dockerfile: Dockerfile
      args:
        CPP17_BASE_IMAGE: "${OJ_CPP17_BASE_IMAGE:-gcc:13-bookworm}"
    image: "${OJ_CPP17_DOCKER_IMAGE:-wenzhong-oj-cpp17-runner:13}"
    command: ["sh", "-lc", "g++ --version >/dev/null && echo C++17 runner image is ready"]
    restart: "no"

volumes:
  postgres-data:
