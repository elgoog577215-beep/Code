debug: false

server:
  port: 8081
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: application/json,application/javascript,text/html,text/xml,text/plain,text/css,application/xml,image/svg+xml,text/javascript

spring:
  application:
    name: nboj
  datasource:
    url: jdbc:h2:file:./data/onlinejudge
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
executor:
  mode: local

ai:
  enabled: ${AI_ENABLED:true}
  base-url: ${AI_BASE_URL:https://api-inference.modelscope.cn/v1}
  api-key: ${MODELSCOPE_API_KEY:}
  model: ${AI_MODEL:MiniMax/MiniMax-M2.7}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:25}

logging:
  file:
    name: logs/nboj.log
  level:
    root: INFO
    com.onlinejudge: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
