debug: false

server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: application/json,application/javascript,text/html,text/xml,text/plain,text/css,application/xml,image/svg+xml,text/javascript

spring:
  application:
    name: nboj
  datasource:
    url: jdbc:h2:file:./data/onlinejudge
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
executor:
  mode: local

ai:
  enabled: ${AI_ENABLED:true}
  provider: ${AI_PROVIDER:ModelScope}
  base-url: ${AI_BASE_URL:https://api-inference.modelscope.cn/v1}
  api-key: ${MODELSCOPE_API_KEY:ms-70c03be8-a926-4386-b0c9-571eac480a52}
  model: ${AI_MODEL:deepseek-ai/DeepSeek-V4-Pro}
  fallback:
    provider: ${AI_FALLBACK_PROVIDER:OpenAI-Compatible-Fallback}
    base-url: ${AI_FALLBACK_BASE_URL:}
    api-key: ${AI_FALLBACK_API_KEY:}
    model: ${AI_FALLBACK_MODEL:}
  routes: ${AI_ROUTES:}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:25}
  external-runtime-enabled: ${AI_EXTERNAL_RUNTIME_ENABLED:true}
  external-runtime-mode: ${AI_EXTERNAL_RUNTIME_MODE:single-call}
  max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:900}
  stream-enabled: ${AI_STREAM_ENABLED:true}
  stream-fallback-enabled: ${AI_STREAM_FALLBACK_ENABLED:true}

logging:
  file:
    name: logs/nboj.log
  level:
    root: INFO
    com.onlinejudge: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
