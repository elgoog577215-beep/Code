debug: false

server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: application/json,application/javascript,text/html,text/xml,text/plain,text/css,application/xml,image/svg+xml,text/javascript

spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${APP_PROFILE:dev}
  application:
    name: nboj
  datasource:
    url: jdbc:h2:file:./data/onlinejudge
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
executor:
  mode: ${EXECUTOR_MODE:local}
  docker:
    cpp17-image: ${OJ_CPP17_DOCKER_IMAGE:wenzhong-oj-cpp17-runner:13}
    python3-image: ${OJ_PYTHON3_DOCKER_IMAGE:python:3.12-slim}

ai:
  enabled: ${AI_ENABLED:true}
  base-url: ${OJ_AI_BASE_URL:${AI_BASE_URL:https://api-inference.modelscope.cn/v1}}
  api-key: ${OJ_MODELSCOPE_API_KEY:${MODELSCOPE_API_KEY:}}
  model: ${OJ_AI_MODEL:${AI_MODEL:Qwen/Qwen3-235B-A22B-Instruct-2507}}
  modelscope-compatible-request: ${AI_MODELSCOPE_COMPATIBLE_REQUEST:auto}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
  external-runtime-enabled: ${AI_EXTERNAL_RUNTIME_ENABLED:true}
  external-runtime-profile: ${AI_EXTERNAL_RUNTIME_PROFILE:low-latency}
  diagnosis-report-v2-enabled: ${AI_DIAGNOSIS_REPORT_V2_ENABLED:true}
  model-failure-degrade-enabled: ${AI_MODEL_FAILURE_DEGRADE_ENABLED:true}
  max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:1800}
  stream-enabled: ${AI_STREAM_ENABLED:true}
  stream-fallback-enabled: ${AI_STREAM_FALLBACK_ENABLED:false}
  structured-retry-enabled: ${AI_STRUCTURED_RETRY_ENABLED:false}
  structured-retry-output-tokens: ${AI_STRUCTURED_RETRY_OUTPUT_TOKENS:2600}
  retry:
    max-attempts: ${AI_RETRY_MAX_ATTEMPTS:1}
    backoff-ms: ${AI_RETRY_BACKOFF_MS:700}
  student-feedback:
    min-request-interval-ms: ${AI_STUDENT_FEEDBACK_MIN_REQUEST_INTERVAL_MS:2000}
  search-location:
    enabled: ${AI_SEARCH_LOCATION_ENABLED:false}
    mode: ${AI_SEARCH_LOCATION_MODE:hybrid}
    candidate-limit: ${AI_SEARCH_LOCATION_CANDIDATE_LIMIT:120}
    selected-limit: ${AI_SEARCH_LOCATION_SELECTED_LIMIT:15}
    require-vector: ${AI_SEARCH_REQUIRE_VECTOR:false}
    text-weight: ${AI_SEARCH_TEXT_WEIGHT:0.45}
    vector-weight: ${AI_SEARCH_VECTOR_WEIGHT:0.35}
  embedding:
    enabled: ${AI_EMBEDDING_ENABLED:false}
    maintenance-enabled: ${AI_EMBEDDING_MAINTENANCE_ENABLED:false}
    base-url: ${AI_EMBEDDING_BASE_URL:${OJ_AI_BASE_URL:${AI_BASE_URL:https://api-inference.modelscope.cn/v1}}}
    api-key: ${AI_EMBEDDING_API_KEY:${OJ_MODELSCOPE_API_KEY:${MODELSCOPE_API_KEY:}}}
    model: ${AI_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-0.6B}
    timeout-seconds: ${AI_EMBEDDING_TIMEOUT_SECONDS:20}
  standard-library-growth:
    enabled: ${AI_STANDARD_LIBRARY_GROWTH_ENABLED:true}
    auto-merge-enabled: ${AI_STANDARD_LIBRARY_AUTO_MERGE_ENABLED:false}
    auto-merge-min-confidence: ${AI_STANDARD_LIBRARY_AUTO_MERGE_MIN_CONFIDENCE:0.90}

---
spring:
  config:
    activate:
      on-profile: school
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://postgres:5432/onlinejudge}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:onlinejudge}
    password: ${POSTGRES_PASSWORD:}
  h2:
    console:
      enabled: false

app:
  profile: school

---
spring:
  config:
    activate:
      on-profile: dev

app:
  profile: dev

logging:
  file:
    name: logs/nboj.log
  level:
    root: INFO
    com.onlinejudge: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
