debug: false

server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: application/json,application/javascript,text/html,text/xml,text/plain,text/css,application/xml,image/svg+xml,text/javascript

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: nboj
  datasource:
    url: jdbc:h2:file:./data/onlinejudge
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
executor:
  mode: ${EXECUTOR_MODE:local}
  docker:
    cpp17-image: ${OJ_CPP17_DOCKER_IMAGE:wenzhong-oj-cpp17-runner:13}
    python3-image: ${OJ_PYTHON3_DOCKER_IMAGE:python:3.12-slim}

ai:
  enabled: ${AI_ENABLED:true}
  base-url: ${OJ_AI_BASE_URL:${AI_BASE_URL:https://api-inference.modelscope.cn/v1}}
  api-key: ${OJ_MODELSCOPE_API_KEY:${MODELSCOPE_API_KEY:}}
  model: ${OJ_AI_MODEL:${AI_MODEL:deepseek-ai/DeepSeek-V4-Pro}}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:25}
  external-runtime-enabled: ${AI_EXTERNAL_RUNTIME_ENABLED:true}
  external-runtime-mode: ${AI_EXTERNAL_RUNTIME_MODE:single-call}
  external-runtime-profile: ${AI_EXTERNAL_RUNTIME_PROFILE:standard}
  max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:1800}
  stream-enabled: ${AI_STREAM_ENABLED:true}
  stream-fallback-enabled: ${AI_STREAM_FALLBACK_ENABLED:true}
  structured-retry-enabled: ${AI_STRUCTURED_RETRY_ENABLED:true}
  structured-retry-output-tokens: ${AI_STRUCTURED_RETRY_OUTPUT_TOKENS:2600}

logging:
  file:
    name: logs/nboj.log
  level:
    root: INFO
    com.onlinejudge: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
